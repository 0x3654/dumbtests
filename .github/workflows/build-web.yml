name: Build and Push Web (topbottom)

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - 'compose.yaml'
      - '.env.example'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:

env:
  DOCKER_IMAGE: 0x3654/topbottom
  DOCKER_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image for testing
        uses: docker/build-push-action@v5
        with:
          context: ./src/web
          platforms: linux/amd64
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:test
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Test container
        run: |
          docker run -d --name topbottom-test -p 3000:3000 \
            -e NODE_ENV=production \
            -e ANALYZER_URL=http://localhost:8001 \
            -e REDIS_URL=redis://localhost:6379 \
            -e NEXT_PUBLIC_SITE_URL=http://localhost:3000 \
            ${{ env.DOCKER_IMAGE }}:test

          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Container is up!"
              break
            fi
            sleep 2
          done

          echo "=== Container logs ==="
          docker logs topbottom-test

          curl -f http://localhost:3000/api/health || exit 1
          echo "Health endpoint OK"

          docker stop topbottom-test
          docker rm topbottom-test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v5
        with:
          context: ./src/web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
