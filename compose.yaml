services:
  topbottom:
    container_name: topbottom
    image: docker.io/0x3654/topbottom:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: always
    depends_on:
      - analyzer
      - redis

  analyzer:
    container_name: analyzer
    image: docker.io/0x3654/analyzer:latest
    ports:
      - "127.0.0.1:8002:8001"
    env_file:
      - .env
    restart: always
    depends_on:
      - redis
    volumes:
      - ./tweet_data:/data

  redis:
    container_name: redis
    image: docker.io/library/redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
